<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1c4d;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 15px;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .left {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right {
            width: 60%;
        }

        .card {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 6px;
        }

        input {
            width: 70%;
            padding: 6px;
        }

        button {
            padding: 6px 12px;
            background: orange;
            border: none;
            color: white;
            cursor: pointer;
        }

        .history span {
            display: inline-block;
            background: orange;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            margin: 4px 4px 0 0;
            font-size: 13px;
        }

        .history span:hover {
            cursor: pointer;
            opacity: 0.85;
        }

        .weather div {
            padding: 4px 0;
        }
    </style>
</head>

<body>

    <h1>Async Weather Tracker</h1>

    <div class="container">

        <div class="left">

            <div class="card">
                <h3>Search City</h3>
                <form>
                    <input type="text" id="search-city" placeholder="Delhi, Mumbai">
                    <button type="submit">Search</button>
                </form>
            </div>

            <div class="card">
                <h3>Search History</h3>
                <div id="searched-cities-box" class="history"></div>
            </div>

        </div>

        <div class="right card">
            <h3>Weather Info</h3>
            <div id="fetched-data-box" class="weather"></div>
        </div>

    </div>

    <script>
        let API_KEY = "1a761d3bb408836cd1af3641ce1604c9";

        let cityInput = document.querySelector("#search-city");
        let form = document.querySelector("form");
        let weather = document.querySelector("#fetched-data-box");
        let searchedCity = document.querySelector("#searched-cities-box");

        async function getWeatherInfo(city) {

            let response = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );

            let data = await response.json();

            if (data.cod !== 200) {
                weather.innerHTML = "City not found ";
                return;
            }

            weather.innerHTML = `
                <div><b>City:</b> ${data.name}, ${data.sys.country}</div>
                <div><b>Temp:</b> ${data.main.temp} °C</div>
                <div><b>Weather:</b> ${data.weather[0].main}</div>
                <div><b>Humidity:</b> ${data.main.humidity}%</div>
                <div><b>Wind:</b> ${data.wind.speed} m/s</div>
            `;

            saveCity(city);
        }

        function saveCity(city) {
            let cities = JSON.parse(localStorage.getItem("cities")) || [];

            // normalize (Delhi == delhi)
            city = city.trim().toLowerCase();

            // prevent duplicates
            if (!cities.includes(city)) {
                cities.push(city);
            }

            localStorage.setItem("cities", JSON.stringify(cities));
            renderHistory();
        }

        function renderHistory() {
            let cities = JSON.parse(localStorage.getItem("cities")) || [];
            searchedCity.innerHTML = "";

            cities.forEach(c => {
                let span = document.createElement("span");
                span.textContent = c;

                span.addEventListener("click", () => {
                    getWeatherInfo(c);
                });

                searchedCity.appendChild(span);
            });
        }

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            getWeatherInfo(cityInput.value);
            cityInput.value = "";
        });

        renderHistory();
    </script>

</body>

</html>
